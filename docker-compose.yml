services:
  web:
    build: .
    ports:
      - "127.0.0.1:${PORT}:3000"
    environment:
      PORT: ${PORT}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - storage:/rails/storage

volumes:
  storage:
